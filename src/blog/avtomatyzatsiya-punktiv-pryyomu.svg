<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1116"/>
      <stop offset="100%" style="stop-color:#1a1d26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd43b"/>
      <stop offset="100%" style="stop-color:#f5c62c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="980" cy="120" r="200" fill="rgba(255,212,59,0.06)"/>
  <circle cx="1100" cy="480" r="160" fill="rgba(255,212,59,0.04)"/>
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Icon: Two interlocking gears (automation) -->
  <g transform="translate(840, 80)">
    <!-- Large gear -->
    <circle cx="120" cy="140" r="80" fill="none" stroke="#ffd43b" stroke-width="3" stroke-dasharray="20 10"/>
    <circle cx="120" cy="140" r="55" fill="rgba(255,212,59,0.15)" stroke="#ffd43b" stroke-width="2"/>
    <circle cx="120" cy="140" r="22" fill="#ffd43b"/>
    <!-- Gear teeth (top) -->
    <rect x="107" y="46" width="26" height="18" rx="4" fill="#ffd43b"/>
    <!-- Gear teeth (bottom) -->
    <rect x="107" y="216" width="26" height="18" rx="4" fill="#ffd43b"/>
    <!-- Gear teeth (left) -->
    <rect x="32" y="131" width="18" height="18" rx="4" fill="#ffd43b"/>
    <!-- Gear teeth (right) -->
    <rect x="210" y="131" width="18" height="18" rx="4" fill="#ffd43b"/>
    <!-- Small gear -->
    <circle cx="240" cy="80" r="50" fill="none" stroke="rgba(255,212,59,0.5)" stroke-width="2" stroke-dasharray="12 6"/>
    <circle cx="240" cy="80" r="34" fill="rgba(255,212,59,0.08)" stroke="rgba(255,212,59,0.4)" stroke-width="1.5"/>
    <circle cx="240" cy="80" r="14" fill="rgba(255,212,59,0.6)"/>
    <!-- Arrow indicating automation flow -->
    <path d="M 50 300 Q 130 260 200 290" stroke="#ffd43b" stroke-width="2" fill="none" stroke-dasharray="8 4"/>
    <polygon points="200,280 212,294 196,302" fill="#ffd43b"/>
  </g>

  <rect x="60" y="56" width="158" height="30" rx="8" fill="rgba(255,212,59,0.15)"/>
  <text x="76" y="75" fill="#ffd43b" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" letter-spacing="1">АВТОМАТИЗАЦІЯ</text>

  <text x="60" y="200" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-1">Автоматизація</text>
  <text x="60" y="270" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-1">пунктів прийому:</text>
  <text x="60" y="340" fill="#ffd43b" font-family="'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-1">з чого починати</text>

  <text x="60" y="420" fill="rgba(255,255,255,0.65)" font-family="'Segoe UI', sans-serif" font-size="22">Практичний план переходу від ручного обліку до системи</text>
  <rect x="60" y="460" width="80" height="4" rx="2" fill="#ffd43b"/>

  <text x="60" y="570" fill="rgba(255,255,255,0.4)" font-family="'Segoe UI', sans-serif" font-size="18">ScrapMaster</text>
  <text x="180" y="570" fill="rgba(255,255,255,0.2)" font-family="'Segoe UI', sans-serif" font-size="18">•</text>
  <text x="200" y="570" fill="rgba(255,255,255,0.4)" font-family="'Segoe UI', sans-serif" font-size="18">scrapmaster.store</text>
</svg>
