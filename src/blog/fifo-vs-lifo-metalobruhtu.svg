<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1116"/>
      <stop offset="100%" style="stop-color:#1a1d26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd43b"/>
      <stop offset="100%" style="stop-color:#f5c62c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="960" cy="130" r="200" fill="rgba(255,212,59,0.06)"/>
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- FIFO: stack of boxes with arrows -->
  <g transform="translate(820, 70)">
    <!-- FIFO stack (left) -->
    <text x="40" y="36" fill="#ffd43b" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="700">FIFO</text>
    <rect x="10" y="48" width="120" height="38" rx="8" fill="rgba(255,212,59,0.6)" stroke="#ffd43b" stroke-width="1"/>
    <rect x="10" y="94" width="120" height="38" rx="8" fill="rgba(255,212,59,0.4)" stroke="#ffd43b" stroke-width="1"/>
    <rect x="10" y="140" width="120" height="38" rx="8" fill="rgba(255,212,59,0.2)" stroke="#ffd43b" stroke-width="1"/>
    <text x="46" y="73" fill="#0e1116" font-family="sans-serif" font-size="14" font-weight="800">Партія 1</text>
    <text x="46" y="119" fill="#0e1116" font-family="sans-serif" font-size="14" font-weight="800">Партія 2</text>
    <text x="46" y="165" fill="#0e1116" font-family="sans-serif" font-size="14" font-weight="800">Партія 3</text>
    <!-- Arrow out top FIFO -->
    <path d="M 70 44 L 70 20" stroke="#ffd43b" stroke-width="2.5" fill="none"/>
    <polygon points="60,24 70,8 80,24" fill="#ffd43b"/>
    <!-- Arrow in bottom FIFO -->
    <path d="M 70 182 L 70 206" stroke="rgba(255,212,59,0.5)" stroke-width="2" fill="none"/>
    <polygon points="60,202 70,218 80,202" fill="rgba(255,212,59,0.5)"/>

    <!-- VS divider -->
    <text x="158" y="130" fill="rgba(255,255,255,0.5)" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="900">vs</text>

    <!-- LIFO stack (right) -->
    <text x="220" y="36" fill="rgba(255,212,59,0.6)" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="700">LIFO</text>
    <rect x="200" y="140" width="120" height="38" rx="8" fill="rgba(255,212,59,0.2)" stroke="rgba(255,212,59,0.5)" stroke-width="1"/>
    <rect x="200" y="94" width="120" height="38" rx="8" fill="rgba(255,212,59,0.35)" stroke="rgba(255,212,59,0.5)" stroke-width="1"/>
    <rect x="200" y="48" width="120" height="38" rx="8" fill="rgba(255,212,59,0.5)" stroke="rgba(255,212,59,0.6)" stroke-width="1"/>
    <text x="236" y="73" fill="#0e1116" font-family="sans-serif" font-size="14" font-weight="800">Партія 3</text>
    <text x="236" y="119" fill="#0e1116" font-family="sans-serif" font-size="14" font-weight="800">Партія 2</text>
    <text x="236" y="165" fill="#0e1116" font-family="sans-serif" font-size="14" font-weight="800">Партія 1</text>
    <!-- Arrow out top LIFO -->
    <path d="M 260 44 L 260 20" stroke="rgba(255,212,59,0.6)" stroke-width="2.5" fill="none"/>
    <polygon points="250,24 260,8 270,24" fill="rgba(255,212,59,0.6)"/>

    <!-- Cost calculation below -->
    <rect x="10" y="260" width="310" height="60" rx="10" fill="rgba(255,212,59,0.08)" stroke="rgba(255,212,59,0.2)" stroke-width="1"/>
    <text x="30" y="286" fill="rgba(255,255,255,0.8)" font-family="sans-serif" font-size="13">Собівартість =</text>
    <text x="140" y="286" fill="#ffd43b" font-family="sans-serif" font-size="13" font-weight="700">вартість партії ÷ кг</text>
    <text x="30" y="308" fill="rgba(255,255,255,0.5)" font-family="sans-serif" font-size="11">Метод впливає на реальну маржу</text>
  </g>

  <rect x="60" y="56" width="110" height="30" rx="8" fill="rgba(255,212,59,0.15)"/>
  <text x="76" y="75" fill="#ffd43b" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" letter-spacing="1">ФІНАНСИ</text>

  <text x="60" y="200" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-size="60" font-weight="800" letter-spacing="-1">FIFO vs LIFO</text>
  <text x="60" y="278" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-size="48" font-weight="800" letter-spacing="-1">для металобрухту:</text>
  <text x="60" y="348" fill="#ffd43b" font-family="'Segoe UI', sans-serif" font-size="48" font-weight="800" letter-spacing="-1">яку метод обрати</text>

  <text x="60" y="428" fill="rgba(255,255,255,0.65)" font-family="'Segoe UI', sans-serif" font-size="22">Вплив методу розрахунку собівартості на реальну маржу</text>
  <rect x="60" y="466" width="80" height="4" rx="2" fill="#ffd43b"/>

  <text x="60" y="570" fill="rgba(255,255,255,0.4)" font-family="'Segoe UI', sans-serif" font-size="18">ScrapMaster</text>
  <text x="180" y="570" fill="rgba(255,255,255,0.2)" font-family="'Segoe UI', sans-serif" font-size="18">•</text>
  <text x="200" y="570" fill="rgba(255,255,255,0.4)" font-family="'Segoe UI', sans-serif" font-size="18">scrapmaster.store</text>
</svg>
