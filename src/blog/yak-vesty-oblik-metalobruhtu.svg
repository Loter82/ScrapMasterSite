<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1116"/>
      <stop offset="100%" style="stop-color:#1a1d26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd43b"/>
      <stop offset="100%" style="stop-color:#f5c62c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="950" cy="100" r="200" fill="rgba(255,212,59,0.06)"/>
  <circle cx="1050" cy="500" r="150" fill="rgba(255,212,59,0.04)"/>
  <circle cx="100" cy="500" r="120" fill="rgba(255,212,59,0.04)"/>

  <!-- Left yellow accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Icon: Clipboard with rows (accounting) -->
  <g transform="translate(840, 120)">
    <!-- Clipboard body -->
    <rect x="0" y="40" width="200" height="260" rx="16" fill="rgba(255,212,59,0.12)" stroke="#ffd43b" stroke-width="2"/>
    <!-- Clipboard clip -->
    <rect x="60" y="24" width="80" height="32" rx="8" fill="#ffd43b"/>
    <!-- Lines on clipboard -->
    <rect x="24" y="110" width="152" height="10" rx="5" fill="rgba(255,212,59,0.5)"/>
    <rect x="24" y="140" width="120" height="10" rx="5" fill="rgba(255,212,59,0.3)"/>
    <rect x="24" y="170" width="140" height="10" rx="5" fill="rgba(255,212,59,0.3)"/>
    <rect x="24" y="200" width="100" height="10" rx="5" fill="rgba(255,212,59,0.3)"/>
    <rect x="24" y="230" width="130" height="10" rx="5" fill="rgba(255,212,59,0.3)"/>
    <!-- Checkmarks -->
    <text x="152" y="120" fill="#ffd43b" font-size="18" font-family="sans-serif">✓</text>
    <text x="152" y="150" fill="rgba(255,212,59,0.5)" font-size="18" font-family="sans-serif">✓</text>
    <text x="152" y="180" fill="rgba(255,212,59,0.5)" font-size="18" font-family="sans-serif">✓</text>
  </g>

  <!-- Category label -->
  <rect x="60" y="56" width="100" height="30" rx="8" fill="rgba(255,212,59,0.15)"/>
  <text x="76" y="75" fill="#ffd43b" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" letter-spacing="1">ОБЛІК</text>

  <!-- Title -->
  <text x="60" y="200" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-1">Як вести облік</text>
  <text x="60" y="270" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-1">металобрухту</text>
  <text x="60" y="340" fill="#ffd43b" font-family="'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-1">ефективно</text>

  <!-- Subtitle -->
  <text x="60" y="420" fill="rgba(255,255,255,0.65)" font-family="'Segoe UI', sans-serif" font-size="22">Покроковий гайд: від зошиту до автоматизованої системи</text>

  <!-- Divider -->
  <rect x="60" y="460" width="80" height="4" rx="2" fill="#ffd43b"/>

  <!-- Footer -->
  <text x="60" y="570" fill="rgba(255,255,255,0.4)" font-family="'Segoe UI', sans-serif" font-size="18">ScrapMaster</text>
  <text x="180" y="570" fill="rgba(255,255,255,0.2)" font-family="'Segoe UI', sans-serif" font-size="18">•</text>
  <text x="200" y="570" fill="rgba(255,255,255,0.4)" font-family="'Segoe UI', sans-serif" font-size="18">scrapmaster.store</text>
</svg>
