<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1116"/>
      <stop offset="100%" style="stop-color:#1a1d26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd43b"/>
      <stop offset="100%" style="stop-color:#f5c62c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1000" cy="160" r="200" fill="rgba(255,212,59,0.06)"/>
  <circle cx="880" cy="520" r="140" fill="rgba(255,212,59,0.04)"/>
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Cash register / safe icon -->
  <g transform="translate(830, 80)">
    <!-- Safe body -->
    <rect x="20" y="40" width="230" height="220" rx="18" fill="rgba(255,212,59,0.1)" stroke="#ffd43b" stroke-width="2"/>
    <!-- Safe door detail -->
    <rect x="50" y="70" width="170" height="160" rx="12" fill="rgba(255,212,59,0.08)" stroke="rgba(255,212,59,0.4)" stroke-width="1.5"/>
    <!-- Central dial -->
    <circle cx="135" cy="150" r="44" fill="rgba(255,212,59,0.12)" stroke="#ffd43b" stroke-width="2"/>
    <circle cx="135" cy="150" r="28" fill="#ffd43b"/>
    <circle cx="135" cy="150" r="10" fill="#0e1116"/>
    <!-- Dial marks -->
    <rect x="133" y="112" width="4" height="10" rx="2" fill="#0e1116"/>
    <rect x="133" y="178" width="4" height="10" rx="2" fill="#0e1116"/>
    <rect x="97" y="148" width="10" height="4" rx="2" fill="#0e1116"/>
    <rect x="163" y="148" width="10" height="4" rx="2" fill="#0e1116"/>
    <!-- Handle -->
    <rect x="175" y="144" width="38" height="12" rx="6" fill="rgba(255,212,59,0.6)"/>
    <!-- UAH symbol on safe -->
    <text x="110" y="246" fill="#ffd43b" font-family="'Segoe UI', sans-serif" font-size="24" font-weight="900">₴</text>
    <!-- Legs -->
    <rect x="50" y="258" width="20" height="16" rx="4" fill="rgba(255,212,59,0.3)"/>
    <rect x="200" y="258" width="20" height="16" rx="4" fill="rgba(255,212,59,0.3)"/>
    <!-- Cash notes floating -->
    <rect x="280" y="120" width="60" height="30" rx="6" fill="rgba(255,212,59,0.4)" transform="rotate(-12, 310, 135)"/>
    <rect x="285" y="170" width="60" height="30" rx="6" fill="rgba(255,212,59,0.25)" transform="rotate(8, 315, 185)"/>
  </g>

  <rect x="60" y="56" width="120" height="30" rx="8" fill="rgba(255,212,59,0.15)"/>
  <text x="76" y="75" fill="#ffd43b" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" letter-spacing="1">КОНТРОЛЬ</text>

  <text x="60" y="200" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-1">Контроль каси</text>
  <text x="60" y="270" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-1">на пункті прийому:</text>
  <text x="60" y="340" fill="#ffd43b" font-family="'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-1">нуль розбіжностей</text>

  <text x="60" y="420" fill="rgba(255,255,255,0.65)" font-family="'Segoe UI', sans-serif" font-size="22">Як виключити крадіжки та помилки в касових операціях</text>
  <rect x="60" y="460" width="80" height="4" rx="2" fill="#ffd43b"/>

  <text x="60" y="570" fill="rgba(255,255,255,0.4)" font-family="'Segoe UI', sans-serif" font-size="18">ScrapMaster</text>
  <text x="180" y="570" fill="rgba(255,255,255,0.2)" font-family="'Segoe UI', sans-serif" font-size="18">•</text>
  <text x="200" y="570" fill="rgba(255,255,255,0.4)" font-family="'Segoe UI', sans-serif" font-size="18">scrapmaster.store</text>
</svg>
