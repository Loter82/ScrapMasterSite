<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1116"/>
      <stop offset="100%" style="stop-color:#1a1d26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd43b"/>
      <stop offset="100%" style="stop-color:#f5c62c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1000" cy="150" r="200" fill="rgba(255,212,59,0.06)"/>
  <circle cx="880" cy="520" r="130" fill="rgba(255,212,59,0.04)"/>
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Digitization: smartphone with data flows -->
  <g transform="translate(830, 60)">
    <!-- Smartphone body -->
    <rect x="60" y="20" width="150" height="260" rx="22" fill="rgba(255,212,59,0.1)" stroke="#ffd43b" stroke-width="2"/>
    <!-- Screen -->
    <rect x="72" y="44" width="126" height="210" rx="10" fill="rgba(255,212,59,0.08)" stroke="rgba(255,212,59,0.3)" stroke-width="1"/>
    <!-- Status bar -->
    <rect x="72" y="44" width="126" height="20" rx="10" fill="rgba(255,212,59,0.2)"/>
    <rect x="72" y="54" width="126" height="10" fill="rgba(255,212,59,0.2)"/>
    <!-- Screen content - app UI -->
    <rect x="82" y="76" width="106" height="14" rx="4" fill="rgba(255,212,59,0.5)"/>
    <rect x="82" y="100" width="80" height="8" rx="2" fill="rgba(255,255,255,0.2)"/>
    <rect x="82" y="116" width="60" height="8" rx="2" fill="rgba(255,255,255,0.15)"/>
    <!-- Mini bar chart in phone -->
    <rect x="82" y="138" width="14" height="40" rx="3" fill="rgba(255,212,59,0.6)"/>
    <rect x="102" y="148" width="14" height="30" rx="3" fill="rgba(255,212,59,0.4)"/>
    <rect x="122" y="132" width="14" height="46" rx="3" fill="#ffd43b"/>
    <rect x="142" y="142" width="14" height="36" rx="3" fill="rgba(255,212,59,0.5)"/>
    <rect x="162" y="128" width="14" height="50" rx="3" fill="#ffd43b"/>
    <!-- Home indicator -->
    <rect x="117" y="266" width="36" height="4" rx="2" fill="rgba(255,212,59,0.5)"/>
    <!-- Camera notch -->
    <rect x="118" y="26" width="34" height="8" rx="4" fill="rgba(255,212,59,0.3)"/>

    <!-- Data flow arrows from left (analog) to phone -->
    <text x="-90" y="115" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="11">Папір</text>
    <path d="M -60 120 L 48 120" stroke="rgba(255,212,59,0.4)" stroke-width="1.5" stroke-dasharray="6 3"/>
    <polygon points="44,114 58,120 44,126" fill="rgba(255,212,59,0.4)"/>

    <text x="-90" y="155" fill="rgba(255,255,255,0.4)" font-family="sans-serif" font-size="11">Excel</text>
    <path d="M -60 158 L 48 158" stroke="rgba(255,212,59,0.4)" stroke-width="1.5" stroke-dasharray="6 3"/>
    <polygon points="44,152 58,158 44,164" fill="rgba(255,212,59,0.4)"/>

    <!-- Data flow arrows to right (digital output) -->
    <path d="M 222 120 L 300 80" stroke="#ffd43b" stroke-width="2" fill="none"/>
    <circle cx="318" cy="70" r="18" fill="rgba(255,212,59,0.2)" stroke="#ffd43b" stroke-width="1.5"/>
    <text x="310" y="76" fill="#ffd43b" font-family="sans-serif" font-size="14">📊</text>

    <path d="M 222 150 L 300 150" stroke="#ffd43b" stroke-width="2" fill="none"/>
    <circle cx="318" cy="150" r="18" fill="rgba(255,212,59,0.2)" stroke="#ffd43b" stroke-width="1.5"/>
    <text x="310" y="156" fill="#ffd43b" font-family="sans-serif" font-size="14">📋</text>

    <path d="M 222 180 L 300 220" stroke="#ffd43b" stroke-width="2" fill="none"/>
    <circle cx="318" cy="230" r="18" fill="rgba(255,212,59,0.2)" stroke="#ffd43b" stroke-width="1.5"/>
    <text x="310" y="236" fill="#ffd43b" font-family="sans-serif" font-size="14">💡</text>
  </g>

  <rect x="60" y="56" width="118" height="30" rx="8" fill="rgba(255,212,59,0.15)"/>
  <text x="76" y="75" fill="#ffd43b" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" letter-spacing="1">ТРЕНДИ</text>

  <text x="60" y="200" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-size="50" font-weight="800" letter-spacing="-1">Цифровізація</text>
  <text x="60" y="264" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-size="50" font-weight="800" letter-spacing="-1">ломозаготівлі:</text>
  <text x="60" y="328" fill="#ffd43b" font-family="'Segoe UI', sans-serif" font-size="50" font-weight="800" letter-spacing="-1">час перейти на систему</text>

  <text x="60" y="408" fill="rgba(255,255,255,0.65)" font-family="'Segoe UI', sans-serif" font-size="22">Ринок змінюється — хто не автоматизується, програє</text>
  <rect x="60" y="448" width="80" height="4" rx="2" fill="#ffd43b"/>

  <text x="60" y="570" fill="rgba(255,255,255,0.4)" font-family="'Segoe UI', sans-serif" font-size="18">ScrapMaster</text>
  <text x="180" y="570" fill="rgba(255,255,255,0.2)" font-family="'Segoe UI', sans-serif" font-size="18">•</text>
  <text x="200" y="570" fill="rgba(255,255,255,0.4)" font-family="'Segoe UI', sans-serif" font-size="18">scrapmaster.store</text>
</svg>
