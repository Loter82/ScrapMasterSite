<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1116"/>
      <stop offset="100%" style="stop-color:#1a1d26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd43b"/>
      <stop offset="100%" style="stop-color:#f5c62c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1020" cy="140" r="200" fill="rgba(255,212,59,0.05)"/>
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Excel spreadsheet with X (Excel doesn't work) -->
  <g transform="translate(810, 70)">
    <!-- Spreadsheet base -->
    <rect x="10" y="20" width="260" height="220" rx="12" fill="rgba(255,212,59,0.07)" stroke="rgba(255,212,59,0.25)" stroke-width="1.5"/>
    <!-- Header row -->
    <rect x="10" y="20" width="260" height="36" rx="12" fill="rgba(255,212,59,0.2)"/>
    <rect x="10" y="44" width="260" height="12" rx="0" fill="rgba(255,212,59,0.2)"/>
    <!-- Column headers -->
    <text x="30" y="44" fill="#ffd43b" font-family="sans-serif" font-size="12" font-weight="700">A</text>
    <text x="100" y="44" fill="#ffd43b" font-family="sans-serif" font-size="12" font-weight="700">B</text>
    <text x="180" y="44" fill="#ffd43b" font-family="sans-serif" font-size="12" font-weight="700">C</text>
    <text x="240" y="44" fill="#ffd43b" font-family="sans-serif" font-size="12" font-weight="700">D</text>
    <!-- Grid lines vertical -->
    <line x1="80" y1="56" x2="80" y2="240" stroke="rgba(255,212,59,0.12)" stroke-width="1"/>
    <line x1="160" y1="56" x2="160" y2="240" stroke="rgba(255,212,59,0.12)" stroke-width="1"/>
    <line x1="230" y1="56" x2="230" y2="240" stroke="rgba(255,212,59,0.12)" stroke-width="1"/>
    <!-- Grid lines horizontal -->
    <line x1="10" y1="90" x2="270" y2="90" stroke="rgba(255,212,59,0.12)" stroke-width="1"/>
    <line x1="10" y1="124" x2="270" y2="124" stroke="rgba(255,212,59,0.12)" stroke-width="1"/>
    <line x1="10" y1="158" x2="270" y2="158" stroke="rgba(255,212,59,0.12)" stroke-width="1"/>
    <line x1="10" y1="192" x2="270" y2="192" stroke="rgba(255,212,59,0.12)" stroke-width="1"/>
    <!-- Cell data -->
    <rect x="20" y="66" width="50" height="14" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="90" y="66" width="60" height="14" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="170" y="66" width="50" height="14" rx="3" fill="rgba(255,255,255,0.1)"/>
    <rect x="20" y="100" width="50" height="14" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="90" y="100" width="60" height="14" rx="3" fill="rgba(255,255,255,0.08)"/>
    <rect x="20" y="134" width="50" height="14" rx="3" fill="rgba(255,255,255,0.06)"/>
    <rect x="90" y="134" width="60" height="14" rx="3" fill="rgba(255,255,255,0.06)"/>
    <!-- Big red X over the spreadsheet -->
    <line x1="30" y1="50" x2="250" y2="230" stroke="#ff4444" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <line x1="250" y1="50" x2="30" y2="230" stroke="#ff4444" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
    <!-- Warning triangle -->
    <polygon points="280,220 330,140 380,220" fill="rgba(255,68,68,0.15)" stroke="#ff4444" stroke-width="2"/>
    <text x="320" y="210" fill="#ff4444" font-family="sans-serif" font-size="26" font-weight="900">!</text>
  </g>

  <rect x="60" y="56" width="120" height="30" rx="8" fill="rgba(255,212,59,0.15)"/>
  <text x="76" y="75" fill="#ffd43b" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" letter-spacing="1">АНАЛІТИКА</text>

  <text x="60" y="200" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-1">Чому Excel</text>
  <text x="60" y="270" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-1">не підходить</text>
  <text x="60" y="340" fill="#ffd43b" font-family="'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-1">для ломозаготівлі</text>

  <text x="60" y="420" fill="rgba(255,255,255,0.65)" font-family="'Segoe UI', sans-serif" font-size="22">5 критичних обмежень Excel при обліку металобрухту</text>
  <rect x="60" y="460" width="80" height="4" rx="2" fill="#ffd43b"/>

  <text x="60" y="570" fill="rgba(255,255,255,0.4)" font-family="'Segoe UI', sans-serif" font-size="18">ScrapMaster</text>
  <text x="180" y="570" fill="rgba(255,255,255,0.2)" font-family="'Segoe UI', sans-serif" font-size="18">•</text>
  <text x="200" y="570" fill="rgba(255,255,255,0.4)" font-family="'Segoe UI', sans-serif" font-size="18">scrapmaster.store</text>
</svg>
