<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1116"/>
      <stop offset="100%" style="stop-color:#1a1d26"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd43b"/>
      <stop offset="100%" style="stop-color:#f5c62c"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="990" cy="130" r="200" fill="rgba(255,212,59,0.05)"/>
  <circle cx="870" cy="510" r="140" fill="rgba(255,212,59,0.04)"/>
  <rect x="0" y="0" width="6" height="630" fill="url(#accent)"/>

  <!-- Audit: magnifying glass over checklist -->
  <g transform="translate(820, 60)">
    <!-- Checklist/document -->
    <rect x="40" y="30" width="180" height="250" rx="14" fill="rgba(255,212,59,0.08)" stroke="rgba(255,212,59,0.3)" stroke-width="1.5"/>
    <!-- Top fold -->
    <polygon points="170,30 220,30 220,80 170,80" fill="rgba(255,212,59,0.15)"/>
    <polygon points="170,30 220,80 170,80" fill="rgba(255,212,59,0.08)"/>
    <!-- Audit checklist items -->
    <circle cx="72" cy="100" r="8" fill="rgba(38,162,105,0.8)"/>
    <text x="68" y="106" fill="#fff" font-family="sans-serif" font-size="11" font-weight="800">✓</text>
    <rect x="90" y="95" width="100" height="10" rx="3" fill="rgba(255,255,255,0.2)"/>

    <circle cx="72" cy="134" r="8" fill="rgba(38,162,105,0.8)"/>
    <text x="68" y="140" fill="#fff" font-family="sans-serif" font-size="11" font-weight="800">✓</text>
    <rect x="90" y="129" width="80" height="10" rx="3" fill="rgba(255,255,255,0.15)"/>

    <circle cx="72" cy="168" r="8" fill="rgba(255,212,59,0.8)"/>
    <text x="68" y="174" fill="#0e1116" font-family="sans-serif" font-size="11" font-weight="800">?</text>
    <rect x="90" y="163" width="110" height="10" rx="3" fill="rgba(255,255,255,0.12)"/>

    <circle cx="72" cy="202" r="8" fill="rgba(255,212,59,0.4)" stroke="rgba(255,212,59,0.6)" stroke-width="1"/>
    <rect x="90" y="197" width="90" height="10" rx="3" fill="rgba(255,255,255,0.1)"/>

    <circle cx="72" cy="236" r="8" fill="rgba(255,212,59,0.4)" stroke="rgba(255,212,59,0.6)" stroke-width="1"/>
    <rect x="90" y="231" width="70" height="10" rx="3" fill="rgba(255,255,255,0.1)"/>

    <!-- Magnifying glass (audit) -->
    <circle cx="250" cy="220" r="70" fill="rgba(255,212,59,0.08)" stroke="#ffd43b" stroke-width="3"/>
    <circle cx="250" cy="220" r="52" fill="rgba(255,212,59,0.05)" stroke="#ffd43b" stroke-width="1.5"/>
    <!-- Glass handle -->
    <line x1="306" y1="276" x2="345" y2="315" stroke="#ffd43b" stroke-width="8" stroke-linecap="round"/>
    <!-- Focus glow -->
    <circle cx="250" cy="220" r="30" fill="rgba(255,212,59,0.15)"/>
    <!-- Search highlight -->
    <line x1="220" y1="220" x2="280" y2="220" stroke="rgba(255,212,59,0.5)" stroke-width="1.5"/>
    <line x1="250" y1="190" x2="250" y2="250" stroke="rgba(255,212,59,0.5)" stroke-width="1.5"/>
  </g>

  <rect x="60" y="56" width="90" height="30" rx="8" fill="rgba(255,212,59,0.15)"/>
  <text x="76" y="75" fill="#ffd43b" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" letter-spacing="1">АУДИТ</text>

  <text x="60" y="200" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-1">Аудит пунктів</text>
  <text x="60" y="270" fill="#ffffff" font-family="'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-1">прийому металу:</text>
  <text x="60" y="340" fill="#ffd43b" font-family="'Segoe UI', sans-serif" font-size="56" font-weight="800" letter-spacing="-1">що перевіряти</text>

  <text x="60" y="420" fill="rgba(255,255,255,0.65)" font-family="'Segoe UI', sans-serif" font-size="22">Чеклист аудиту: каса, склад, персонал, документи</text>
  <rect x="60" y="460" width="80" height="4" rx="2" fill="#ffd43b"/>

  <text x="60" y="570" fill="rgba(255,255,255,0.4)" font-family="'Segoe UI', sans-serif" font-size="18">ScrapMaster</text>
  <text x="180" y="570" fill="rgba(255,255,255,0.2)" font-family="'Segoe UI', sans-serif" font-size="18">•</text>
  <text x="200" y="570" fill="rgba(255,255,255,0.4)" font-family="'Segoe UI', sans-serif" font-size="18">scrapmaster.store</text>
</svg>
